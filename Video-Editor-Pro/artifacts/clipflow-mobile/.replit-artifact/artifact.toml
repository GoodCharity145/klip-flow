kind = "mobile"
previewPath = "/mobile/"
title = "ClipFlow Mobile"
version = "1.0.0"
id = "artifacts/clipflow-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 18424

[services.development]
run = "pnpm --filter @workspace/clipflow-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clipflow-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/clipflow-mobile", "run", "serve" ]

[services.env]
PORT = "18424"
BASE_PATH = "/mobile/"
