kind = "web"
previewPath = "/"
title = "ClipFlow - Video Editor"
version = "1.0.0"
id = "artifacts/clipflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21111

[services.development]
run = "pnpm --filter @workspace/clipflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clipflow", "run", "build" ]
publicDir = "artifacts/clipflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21111"
BASE_PATH = "/"
